services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/gurkengewuerz/monaa-lisa/backend:latest
    command: bunx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - internal

  backend:
    image: ghcr.io/gurkengewuerz/monaa-lisa/backend:latest
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.monaa-backend.entrypoints=websecure"
      - "traefik.http.routers.monaa-backend.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.monaa-backend.service=monaa-backend-srv"
      - "traefik.http.services.monaa-backend-srv.loadbalancer.server.port=3000"

  frontend:
    image: ghcr.io/gurkengewuerz/monaa-lisa/frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    networks:
      - internal
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.monaa-frontend.entrypoints=websecure"
      - "traefik.http.routers.monaa-frontend.rule=Host(`${VIRTUAL_HOST}`)"
      - "traefik.http.routers.monaa-frontend.service=monaa-frontend-srv"
      - "traefik.http.services.monaa-frontend-srv.loadbalancer.server.port=5173"

  app:
    image: ghcr.io/gurkengewuerz/monaa-lisa/pipeline:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      DATA_DIR: /app/data
    volumes:
      - app_data:/app/data
    networks:
      - internal

  watchtower:
    image: containrrr/watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_INCLUDE_STOPPED: "false"
    networks:
      - internal

networks:
  internal:
    driver: bridge
  traefik:
    external: true

volumes:
  pgdata:
  app_data:
