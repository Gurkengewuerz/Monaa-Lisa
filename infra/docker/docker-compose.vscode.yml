# Please never run this docker-compose in Production! This is entirely serving as a dev environment.
# 25-06-2025 - Basti (updated paths after monorepo restructuring)
services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monaa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ../../packages/pipeline
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PYTHONPATH: /app/src
      PYTHONUNBUFFERED: 1
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      DATA_DIR: /app/data
    volumes:
      - ../../packages/pipeline:/app
      - python_cache:/root/.cache/pip
      - app_data_dev:/app/data
    working_dir: /app
    command: ["/bin/sh", "-c", "tail -f /dev/null"]
    ports:
      - "5000:5000"
      - "8000:8000"
    stdin_open: true
    tty: true

  backend:
    image: node:20
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 3000
    volumes:
      - ../../apps/backend:/app
      - backend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npx prisma generate && npx prisma db push && npm run start:dev"]
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ../../apps/frontend
    ports:
      - "5173:5173"
      - "24678:24678"
    depends_on:
      - app
      - backend
    volumes:
      - ../../apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: "http://backend:3000"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command: ["sh", "-c", "npm install && npx vite dev --host 0.0.0.0 --port 5173"]
    stdin_open: true
    tty: true

volumes:
  pgdata_dev:
  python_cache:
  frontend_node_modules:
  backend_node_modules:
  app_data_dev:
