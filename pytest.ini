[pytest]
# Basis-Test-Verzeichnis
testpaths = MonaaLisa/src/SemanticPaper/tests

# Python-Pfade für Imports
pythonpath = MonaaLisa/src

# Verbose Output und Coverage
addopts = -v --tb=short

# Test-Discovery-Pattern
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marker für optionale Tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Logging während Tests
log_cli = true
log_cli_level = WARNING

# Filter Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

