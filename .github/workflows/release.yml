name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: |
            ghcr.io/gurkengewuerz/monaa-lisa/backend:${{ steps.meta.outputs.version }}
            ghcr.io/gurkengewuerz/monaa-lisa/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: true
          tags: |
            ghcr.io/gurkengewuerz/monaa-lisa/frontend:${{ steps.meta.outputs.version }}
            ghcr.io/gurkengewuerz/monaa-lisa/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push pipeline
        uses: docker/build-push-action@v6
        with:
          context: packages/pipeline
          target: app
          push: true
          tags: |
            ghcr.io/gurkengewuerz/monaa-lisa/pipeline:${{ steps.meta.outputs.version }}
            ghcr.io/gurkengewuerz/monaa-lisa/pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog and create GitHub Release
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --tag ${{ steps.meta.outputs.version }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          tag_name: ${{ steps.meta.outputs.version }}
