name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            context: apps/backend
            dockerfile: apps/backend/Dockerfile
            target: ""
          - image: frontend
            context: apps/frontend
            dockerfile: apps/frontend/Dockerfile
            target: ""
          - image: pipeline
            context: packages/pipeline
            dockerfile: packages/pipeline/Dockerfile
            target: app
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/gurkengewuerz/monaa-lisa/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=${{ matrix.image }} image
            maintainer=${{ github.repository_owner }}

      - name: Build and push
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.image }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new-${{ matrix.image }},mode=max

      - name: Build and push (target)
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache-${{ matrix.image }}
          cache-to: type=local,dest=/tmp/.buildx-cache-new-${{ matrix.image }},mode=max

      - name: Move build cache
        run: |
          rm -rf /tmp/.buildx-cache-${{ matrix.image }}
          mv /tmp/.buildx-cache-new-${{ matrix.image }} /tmp/.buildx-cache-${{ matrix.image }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog and create GitHub Release
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --tag ${{ steps.version.outputs.version }}
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          tag_name: ${{ steps.version.outputs.version }}
