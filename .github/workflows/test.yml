name: Run Pytest and Coverage on PRs => dev main

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'  # Wähle deine Python-Version

      - name: Install dependencies # 1) Module updaten 2) Deps installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
#          pip install pytest coverage <- Kann denke ich weg jetzt, muss ich noch testen

      - name: Run tests with coverage # Coverage erzeugt für mich einen Bericht zum schauen welche Fälle noch nicht getestet werden
        run: |
          coverage run -m pytest
          coverage report
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
