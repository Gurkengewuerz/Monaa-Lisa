name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint + Prettier)
        run: bun run lint

      - name: Type check frontend
        working-directory: apps/frontend
        run: bun run check

      - name: Generate Prisma client
        working-directory: apps/backend
        run: bun run prisma:generate

      - name: Type check backend
        working-directory: apps/backend
        run: bunx tsc --noEmit

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        working-directory: apps/backend
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/backend
        run: bun run prisma:generate

      - name: Run migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: bunx prisma migrate deploy

      - name: Run unit tests
        working-directory: apps/backend
        run: bun test

      - name: Run e2e tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: bun run test:e2e

  test-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions

      - name: Install dependencies
        working-directory: apps/frontend
        run: bun install --frozen-lockfile

      - name: Build (implicit type check)
        working-directory: apps/frontend
        run: bun run build

  test-python:
    name: Test Python Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .tool-versions

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: packages/pipeline
        run: uv sync --extra dev

      - name: Lint with ruff
        working-directory: packages/pipeline
        run: uv run ruff check src/

      - name: Run tests
        working-directory: packages/pipeline
        run: PYTHONPATH=src uv run pytest tests/

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test-backend, test-python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: apps/backend
          push: true
          tags: ghcr.io/gurkengewuerz/monaa-lisa/backend:${{ github.sha }},ghcr.io/gurkengewuerz/monaa-lisa/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: apps/frontend
          push: true
          tags: ghcr.io/gurkengewuerz/monaa-lisa/frontend:${{ github.sha }},ghcr.io/gurkengewuerz/monaa-lisa/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push pipeline
        uses: docker/build-push-action@v6
        with:
          context: packages/pipeline
          target: app
          push: true
          tags: ghcr.io/gurkengewuerz/monaa-lisa/pipeline:${{ github.sha }},ghcr.io/gurkengewuerz/monaa-lisa/pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
