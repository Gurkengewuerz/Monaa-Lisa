services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER-monaa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD-sicherespasswort}
      POSTGRES_DB: ${POSTGRES_DB-monaa_lisa_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monaa} -d ${POSTGRES_DB:-monaa_lisa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: app
    image: monaa-lisa-app:latest
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER-monaa}:${POSTGRES_PASSWORD-sicherespasswort}@db:5432/${POSTGRES_DB-monaa_lisa_db}
      PYTHONPATH: /app/MonaaLisa/src
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      DATA_DIR: /app/data
    volumes:
      - ./MonaaLisa/src:/app/MonaaLisa/src
      - python_cache:/root/.cache/pip
      - app_data:/app/data
    command: ["/bin/sh", "-c", "python MonaaLisa/src/Database/db.py && python MonaaLisa/src/main.py"]

  backend:
    image: node:20
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 3000
    volumes:
      - ./MonaaLisa/src/Backend:/app
      - backend_node_modules:/app/node_modules
    command: ["sh", "-c", "npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npm run start:prod"]
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    healthcheck:
      # Prüft, ob der Server auf Port 3000 antwortet via wget
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      # WICHTIG: Gib ihm Zeit für npm install & migration, bevor der erste Check zählt
      start_period: 30s


  frontend:
    build:
      context: ./MonaaLisa/src/Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - app
      - backend
    volumes:
      - ./MonaaLisa/src/Frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://backend:3000"

  import:
    build:
      context: .
      target: app
    image: monaa-lisa-app:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./MonaaLisa_dataset_full.jsonl:/app/MonaaLisa_dataset_full.jsonl:ro
      - ./import_dataset.py:/app/import_dataset.py:ro
    working_dir: /app
    profiles:
      - import
    command: ["python", "import_dataset.py", "--file", "MonaaLisa_dataset_full.jsonl", "--batch-size", "5000"]
    
volumes:
  pgdata:
  python_cache:
  backend_node_modules:
  app_data:
