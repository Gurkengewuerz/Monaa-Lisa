[semanticpaper]
log_level = INFO
queue_max_size = 100
historical_fetch_interval_seconds = 15
arxiv_min_interval = 1.0
embeddings_preload_limit = 5000
category_config_path = /app/src/categories.json
reload_interval = 100

# Data directory for downloaded dataset and models
data_dir = /app/data

# Pre-trained model paths (filenames from mirrors.json)
pca_model_path = /app/data/models/pca_model_128d.pkl
umap_model_path = /app/data/models/umap_model_2d.pkl

# Incremental update interval (days)
incremental_update_interval_days = 30

# SemanticScholar batch request size (max 500)
s2_batch_size = 400

# Uncaught paper retry interval (days) and max retries before dropping
uncaught_retry_interval_days = 14
uncaught_max_retries = 4

# Dataset import batch size
import_batch_size = 5000